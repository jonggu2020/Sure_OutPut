global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Gateway 서버 메트릭
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8000"]

  # 모델 서버 메트릭
  - job_name: "model-phishing"
    static_configs:
      - targets: ["model-phishing:8001"]

  - job_name: "model-network"
    static_configs:
      - targets: ["model-network:8002"]

  - job_name: "model-aiops"
    static_configs:
      - targets: ["model-aiops:8003"]

  # cAdvisor (Docker 컨테이너 메트릭)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
